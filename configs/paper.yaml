train_pairs:
  - [2002, 2007]
  - [2002, 2012]
  - [2007, 2012]
eval_pairs:
  - [2012, 2020]
panel_path: panels/prism_panel_64.json
disease_whitelist_path: templates/paper_diseases.example.json
display_year_aliases:
  2020: 2022
selection:
  initial_panel_size: 256
  candidate_pool_size: 1024
  max_pairwise_correlation: 0.85
  target_panel_size: 64
  prune_step: 16
  epochs_per_round: 6
reconstruction:
  hidden_dim: 512
  depth: 2
  dropout: 0.1
  batch_size: 64
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  cosine_weight: 1.0
  train_ratio: 0.8
  seed: 42
  device: cpu
evaluation:
  age_alpha_grid: [1.0e-08, 1.0e-05, 1.0e-04, 1.0e-03, 1.0e-02, 5.0e-01]
  disease_years: [2007, 2012, 2020]
  disease_epochs: 10
  disease_hidden_dim: 128
  disease_dropout: 0.2
  disease_lr: 0.001
